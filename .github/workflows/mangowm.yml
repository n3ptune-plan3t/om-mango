name: OpenMandriva Cooker Local RPM Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-package:
    runs-on: ubuntu-latest
    
    container:
      image: docker.io/openmandriva/cooker:latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Update Package Manager
        run: |
          dnf clean all
          dnf makecache

      - name: Install Build Tools
        run: |
          dnf install -y rpm-build rpmdevtools dnf-plugins-core

      - name: Install Build Dependencies (BuildRequires)
        run: |
          dnf builddep -y mangowm.spec

      - name: Execute Build via abb for znver1
        run: |
          dnf install -y abb

          export HOME=/tmp/build_home
          mkdir -p $HOME

          abb build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openmandriva-cooker-rpms
          path: /github/home/rpmbuild/RPMS/znver1/*.rpm
          if-no-files-found: error
          compression-level: 6
          overwrite: false
          include-hidden-files: false

